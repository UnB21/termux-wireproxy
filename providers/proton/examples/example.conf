[Interface]
# Replace with your VPN provider private key
PrivateKey = YOUR_PRIVATE_KEY_HERE

# Replace with your assigned VPN address
Address = 10.0.0.2/32

# Replace with your provider DNS server
DNS = 10.0.0.1

[Peer]
# Replace with your VPN server public key
PublicKey = SERVER_PUBLIC_KEY

# Route all traffic through the VPN tunnel
AllowedIPs = 0.0.0.0/0

# Replace with your VPN server endpoint
Endpoint = VPN_SERVER:51820

# Keep the tunnel alive through NAT
PersistentKeepalive = 25
